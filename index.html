<html lang="es"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KARIM</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&amp;family=Poppins:wght@200;300;400;600&amp;display=swap" rel="stylesheet">
<style>
:root{--color-lila:#5d6977;--color-morado:#8f8b87;--color-negro-puro:#101328}
body{margin:0;padding:0;font-family:'Poppins',sans-serif;background-color:var(--color-negro-puro);color:white;overflow:hidden;user-select:none;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none}
.animated-bg{background:linear-gradient(135deg,#000,#5d6977,#8f8b87,#000);background-size:400% 400%;animation:moveGradient 12s ease infinite;position:fixed;width:100%;height:100%;z-index:-1}
@keyframes moveGradient{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.text-3d{font-family:'Playfair Display',serif;font-weight:900;font-size:5.5rem;background:linear-gradient(to bottom,#fff,#5d6977);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 10px 15px rgba(143,139,135));letter-spacing:-2px;animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
.btn-entrar{position:relative;padding:12px 40px;background:transparent;border:1px solid var(--color-lila);color:white;font-weight:300;letter-spacing:4px;text-transform:uppercase;border-radius:50px;overflow:hidden;transition:all .5s ease;cursor:pointer;box-shadow:0 0 20px rgba(143,139,135)}
.btn-entrar:hover{background:var(--color-morado);box-shadow:0 0 30px rgba(143,139,135);transform:scale(1.05);border-color:transparent}
.glass-card{background:rgba(255,255,255,.05);backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);border:1px solid rgba(255,255,255,.1);border-radius:40px;box-shadow:0 25px 50px -12px rgba(0,0,0,.8)}
.profile-container{position:relative;width:180px;height:180px;margin-bottom:2rem}
.profile-border{position:absolute;inset:-3px;background:linear-gradient(45deg,var(--color-morado),transparent,var(--color-lila));border-radius:50%;animation:rotateBorder 6s linear infinite}
@keyframes rotateBorder{to{transform:rotate(360deg)}}
.profile-img{position:relative;width:100%;height:100%;border-radius:50%;object-fit:cover;border:5px solid #5d6977;z-index:2;pointer-events:none}
.info-pill{background:rgba(143,139,135);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:12px 24px;transition:all .3s ease}
#music-container{position:fixed;bottom:20px;left:20px;z-index:100;display:flex;align-items:center;gap:12px;padding:10px;background:rgba(10,10,10,.6);backdrop-filter:blur(10px);border:1px solid rgba(168,85,247,.3);border-radius:50px;max-width:50px;overflow:hidden;transition:max-width .5s cubic-bezier(.4,0,.2,1),padding .5s;cursor:pointer}
#music-container.expanded{max-width:320px;padding:10px 20px;cursor:default}
.music-icon{min-width:30px;height:30px;display:flex;align-items:center;justify-content:center;color:var(--color-lila);animation:pulse 2s infinite}
@keyframes pulse{0%{transform:scale(1);opacity:1}50%{transform:scale(1.1);opacity:.7}100%{transform:scale(1);opacity:1}}
.music-info{white-space:nowrap;opacity:0;transition:opacity .3s ease;display:flex;flex-direction:column}
#music-container.expanded .music-info{opacity:1}
.song-title{font-size:.75rem;font-weight:600;color:white;letter-spacing:1px}
.song-artist{font-size:.65rem;color:var(--color-lila)}
audio{height:25px;margin-top:5px;filter:invert(1) hue-rotate(250deg) brightness(1.5);width:200px}
#main-content{display:none;opacity:0;transition:opacity 1s ease}
#intro-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;transition:transform .8s ease,opacity .8s ease}
.fade-out{transform:scale(1.1);opacity:0;pointer-events:none}
.fade-in{display:block!important;opacity:1!important}
.orb{position:absolute;width:200px;height:200px;border-radius:50%;background:var(--color-morado);filter:blur(100px);opacity:.15;z-index:-1}
@media (max-width:640px){.text-3d{font-size:3.5rem}}
</style>

ibold{font-weight:600}.uppercase{text-transform:uppercase}.tracking-\[0\.4em\]{letter-spacing:0.4em}.tracking-widest{letter-spacing:0.1em}.text-purple-100{--tw-text-opacity:1;color:rgb(243 232 255 / var(--tw-text-opacity, 1))}.text-purple-200{--tw-text-opacity:1;color:rgb(233 213 255 / var(--tw-text-opacity, 1))}.text-white{--tw-text-opacity:1;color:rgb(255 255 255 / var(--tw-text-opacity, 1))}</style></head>
<body class="flex items-center justify-center min-h-screen" oncontextmenu="return false" onselectstart="return false" ondragstart="return false">
<div class="animated-bg"></div>
<div class="orb top-0 right-0"></div>
<div class="orb bottom-0 left-0" style="background:var(--color-lila)"></div>
<div id="music-container" onclick="toggleMusic(event)">
<div class="music-icon" id="toggle-btn">
<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
</div>
<div class="music-info">
<span class="song-title">Amr Diab</span>
<span class="song-artist"></span>
<audio id="player" controls="" loop="">
    <source src="https://files.catbox.moe/zxhxa4.mp3" type="audio/mpeg">
</audio>
</div>
</div>
<div id="intro-screen">
<h1 class="text-3d mb-12">KARIM</h1>
<button class="btn-entrar" onclick="startExperience()">Entrar</button>
</div>
<div id="main-content" class="w-full max-w-md p-6">
<div class="text-center mb-6"><h1 class="text-3d" style="font-size:3rem;margin-bottom:0">KARIM</h1></div>
<div class="glass-card p-10 flex flex-col items-center">
<div class="profile-container">
<div class="profile-border"></div>
<img src="https://xatimg.com/image/skG9L6mK81aX.png" alt="Andru" class="profile-img" ondragstart="return false" onerror="this.src='https://via.placeholder.com/180/050505/d8b4fe?text=KARIM'">
</div>
<h2 class="text-xs uppercase tracking-[0.4em] text-gray-200 font-semibold mb-8" style="text-shadow:0 0 10px rgba(229,231,235)">About Me</h2>
<div class="w-full space-y-4">
<div class="info-pill flex justify-between items-center">
<span class="text-gray-200 text-xs uppercase tracking-widest font-light"></span>
<div class="flex items-center gap-3">
<span class="text-white text-sm">Egypt</span>
<img src="https://xatimg.com/image/meUzrDcCLAb3.png" alt="AR" class="w-6 h-auto rounded-sm" ondragstart="return false">
</div>
</div>
<div class="info-pill flex justify-between items-center">
<span class="text-Gray-100 text-xs uppercase tracking-widest font-light"></span>
<div class="flex items-center gap-3"><span class="text-xl">♌</span><span class="text-white text-sm font-medium">Amr</span></div>
</div>
</div>
<div class="mt-10 flex gap-1"><div class="w-8 h-1 rounded-full bg-Gray-400/40"></div><div class="w-2 h-1 rounded-full bg-Gray-400/20"></div><div class="w-2 h-1 rounded-full bg-Gray-400/10"></div></div>
</div>
</div>
<script>
(function(){
document.addEventListener('keydown',function(e){
if(e.keyCode==123||(e.ctrlKey&&e.shiftKey&&(e.keyCode==73||e.keyCode==74))||(e.ctrlKey&&(e.keyCode==85||e.keyCode==83||e.keyCode==80||e.keyCode==65||e.keyCode==67||e.keyCode==86||e.keyCode==88))){
e.preventDefault();return false;
}
});
document.addEventListener('copy',e=>e.preventDefault());
document.addEventListener('cut',e=>e.preventDefault());
document.addEventListener('paste',e=>e.preventDefault());
document.addEventListener('contextmenu',e=>e.preventDefault());
})();
function startExperience(){
const i=document.getElementById('intro-screen'),m=document.getElementById('main-content'),p=document.getElementById('player');
p.play().catch(()=>{});
i.classList.add('fade-out');
setTimeout(()=>{i.style.display='none';m.classList.add('fade-in');document.body.style.overflow='auto'},800);
}
function toggleMusic(e){
const c=document.getElementById('music-container');
if(!c.classList.contains('expanded')){c.classList.add('expanded')}
else if(e.target.closest('#toggle-btn')){c.classList.remove('expanded')}
}
</script>

</body></html>
