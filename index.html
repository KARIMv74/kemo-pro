<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARIM | LIQUID ONYX UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@200;300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-top: #050509;
            --bg-bottom: #0f172a;
            /* ألوان السائل المتحرك جوه الكارت */
            --liquid-color-1: #1e293b; /* رمادي مزرق داكن */
            --liquid-color-2: #1a1033; /* بنفسجي ليلي عميق */
            --card-base: rgba(15, 15, 25, 0.7); /* شفافة أكتر عشان يبان السائل */
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --glow-1: rgba(51, 65, 85, 0.2);
            --glow-2: rgba(15, 23, 42, 0.3);
        }

        body {
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif;
            background-color: var(--bg-top); color: var(--text-primary);
            overflow: hidden; user-select: none; -webkit-user-select: none;
        }

        .animated-bg {
            position: fixed; width: 100%; height: 100%; z-index: -2;
            background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
        }

        .bg-glow-orb {
            position: fixed; width: 500px; height: 500px; border-radius: 50%;
            z-index: -1; animation: orbMove 25s infinite alternate ease-in-out;
            filter: blur(130px);
        }
        .orb-1 { background: var(--glow-1); top: -10%; left: -10%; }
        .orb-2 { background: var(--glow-2); bottom: -10%; right: -10%; animation-delay: -5s; }

        @keyframes orbMove {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(20%, 15%) scale(1.1); }
            100% { transform: translate(-10%, 25%) scale(1); }
        }

        .text-3d {
            font-family: 'Playfair Display', serif; font-weight: 900;
            font-size: 6rem; background: linear-gradient(to bottom, #fff 40%, var(--text-secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -2px; animation: floatTitle 5s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(148, 163, 184, 0.3));
        }
        @keyframes floatTitle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .btn-entrar {
            position: relative; padding: 15px 55px; background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(148, 163, 184, 0.3); color: #fff;
            font-weight: 300; letter-spacing: 5px; text-transform: uppercase;
            border-radius: 50px; overflow: hidden; transition: all .5s ease;
            box-shadow: 0 5px 25px rgba(0,0,0,0.6);
        }
        .btn-entrar:hover {
            background: rgba(148, 163, 184, 0.15);
            box-shadow: 0 0 35px rgba(148, 163, 184, 0.3); transform: translateY(-3px);
            border-color: var(--text-secondary);
        }

        /* ----------------------------------------------------------- */
        /* ستايل الكارت بالسائل الانسيابي المتحرك جوه */
        /* ----------------------------------------------------------- */
        .glass-card {
            position: relative;
            background: var(--card-base);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 40px;
            box-shadow: 0 40px 90px -15px rgba(0,0,0,0.9);
            overflow: hidden; /* مهم جداً عشان السائل ميتطلعش بره */
        }

        /* طبقة السائل المتحرك */
        .glass-card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            z-index: -1; /* خلف المحتوى */
            background: linear-gradient(
                135deg,
                var(--card-base) 0%,
                var(--liquid-color-1) 25%,
                var(--card-base) 50%,
                var(--liquid-color-2) 75%,
                var(--card-base) 100%
            );
            background-size: 400% 400%;
            animation: liquidMove 15s ease infinite;
            opacity: 0.8; /* شفافية السائل */
        }

        @keyframes liquidMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        /* ----------------------------------------------------------- */

        .profile-container { position: relative; width: 190px; height: 190px; margin-bottom: 2.5rem; z-index: 1; }
        .profile-border {
            position: absolute; inset: -5px;
            background: conic-gradient(from 0deg, var(--bg-top), var(--text-secondary), var(--bg-top));
            border-radius: 50%; animation: rotateConic 10s linear infinite;
        }
        @keyframes rotateConic { to { transform: rotate(360deg); } }
        .profile-img {
            position: relative; width: 100%; height: 100%; border-radius: 50%;
            object-fit: cover; border: 7px solid #080810; z-index: 2;
            box-shadow: 0 0 25px rgba(0,0,0,0.8);
        }

        .info-pill {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 15px; padding: 15px 30px;
            position: relative; overflow: hidden;
            transition: all 0.4s ease;
            z-index: 1;
        }
        .info-pill:hover { background: rgba(148, 163, 184, 0.05); transform: translateX(5px); }
        .info-pill::before {
            content: ""; position: absolute; left: 0; top: 0; height: 100%;
            width: 3px; background: var(--text-secondary); opacity: 0.4;
        }
        .info-pill:hover::before { opacity: 1; box-shadow: 0 0 10px var(--text-secondary); }

        #music-container {
            position: fixed; bottom: 30px; left: 30px; z-index: 100;
            display: flex; align-items: center; gap: 15px; padding: 12px;
            background: rgba(10, 10, 20, 0.85); backdrop-filter: blur(15px);
            border: 1px solid rgba(148, 163, 184, 0.25); border-radius: 50px;
            max-width: 60px; overflow: hidden;
            transition: max-width .6s cubic-bezier(.4,0,.2,1), padding .6s;
            cursor: pointer; box-shadow: 0 10px 40px rgba(0,0,0,0.7);
        }
        #music-container.expanded { max-width: 350px; padding: 12px 25px; cursor: default; }
        .music-icon { color: var(--text-secondary); animation: pulseMusic 3s infinite; }
        @keyframes pulseMusic { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.05); } }
        
        audio { height: 30px; margin-top: 8px; filter: invert(1) brightness(1.3); width: 230px; }

        #main-content.fade-in {
            animation: fadeInUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(50px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        #intro-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; transition: all .8s ease; }
        .fade-out { transform: scale(1.1); opacity: 0; pointer-events: none; }
        #main-content { display: none; opacity: 0; }

        .designer-credit {
            text-align: center; font-size: 0.7rem; color: rgba(148, 163, 184, 0.3);
            letter-spacing: 6px; text-transform: uppercase; margin-top: 35px;
            z-index: 1;
        }
        .designer-credit span { color: rgba(148, 163, 184, 0.7); font-weight: 600; }

        @media (max-width:640px) { .text-3d { font-size: 4rem; } .profile-container { width: 160px; height: 160px; } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen" oncontextmenu="return false" onselectstart="return false" ondragstart="return false">
    <div class="animated-bg"></div>
    <div class="bg-glow-orb orb-1"></div>
    <div class="bg-glow-orb orb-2"></div>

    <div id="music-container" onclick="toggleMusic(event)">
        <div class="music-icon" id="toggle-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
        </div>
        <div class="music-info" style="white-space:nowrap; opacity:0; transition:opacity .3s ease;">
            <audio id="player" controls="" loop="">
                <source src="https://files.catbox.moe/8sruil.mp3" type="audio/mpeg">
            </audio>
        </div>
    </div>

    <div id="intro-screen">
        <h1 class="text-3d mb-12">KARIM</h1>
        <button class="btn-entrar" onclick="startExperience()">Enter</button>
    </div>

    <div id="main-content" class="w-full max-w-md p-6">
        <div class="text-center mb-8"><h1 class="text-3d" style="font-size:3.5rem; margin-bottom:0">KARIM</h1></div>
        
        <div class="glass-card p-10 flex flex-col items-center">
            <div class="profile-container">
                <div class="profile-border"></div>
                <img src="https://xatimg.com/image/skG9L6mK81aX.png" alt="Karim" class="profile-img">
            </div>

            <div class="w-full space-y-6">
                <div class="info-pill flex justify-between items-center">
                    <span style="opacity: 0;"></span>
                    <div class="flex items-center gap-3">
                        <span class="text-white text-sm font-medium">𝑬𝒈𝒚𝒑𝒕</span>
                        <img src="https://xatimg.com/image/meUzrDcCLAb3.png" alt="EG" class="w-6 h-auto rounded-sm">
                    </div>
                </div>
                
                <div class="info-pill flex justify-between items-center">
                    <span style="opacity: 0;"></span>
                    <div class="flex items-center gap-3">
                        <span class="text-white text-sm font-medium">𝑷𝒂𝒖𝒍𝒐</span>
                        <span class="text-2xl" style="color:var(--text-secondary)">♌</span>
                    </div>
                </div>
            </div>
            
            <div class="mt-12 flex gap-1.5"><div class="w-10 h-1 rounded-full bg-slate-400/50"></div><div class="w-2.5 h-1 rounded-full bg-slate-400/20"></div><div class="w-2.5 h-1 rounded-full bg-slate-400/10"></div></div>
        </div>
        
        <div class="designer-credit">Design   <span>KEMO</span></div>
    </div>

    <script>
        (function(){
            document.addEventListener('keydown',function(e){
                if(e.keyCode==123||(e.ctrlKey&&e.shiftKey&&(e.keyCode==73||e.keyCode==74))||(e.ctrlKey&&(e.keyCode==85||e.keyCode==83||e.keyCode==80||e.keyCode==65||e.keyCode==67||e.keyCode==86||e.keyCode==88))){
                    e.preventDefault(); return false;
                }
            });
            document.addEventListener('contextmenu',e=>e.preventDefault());
        })();

        function startExperience(){
            const i=document.getElementById('intro-screen'),m=document.getElementById('main-content'),p=document.getElementById('player');
            p.play().catch(()=>{});
            i.classList.add('fade-out');
            setTimeout(()=>{
                i.style.display='none';
                m.style.display='block';
                setTimeout(()=>m.classList.add('fade-in'), 50);
                document.body.style.overflow='auto';
            },800);
        }

        function toggleMusic(e){
            const c=document.getElementById('music-container'),info=c.querySelector('.music-info');
            if(!c.classList.contains('expanded')){
                c.classList.add('expanded');
                setTimeout(()=>info.style.opacity='1', 350);
            }
            else if(e.target.closest('#toggle-btn')){
                info.style.opacity='0';
                setTimeout(()=>c.classList.remove('expanded'), 100);
            }
        }
    </script>
</body>
</html>
